<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">用户管理系统</div>
        <div class="nav-menu">
            {% if session.get('user') %}
                <span class="nav-welcome">欢迎，{{ session['user'] }}</span>
                <a href="{{ url_for('logout') }}" class="nav-link">退出</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="nav-link">登录</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
