<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('index') }}" style="color:#fff; text-decoration:none;">用户管理系统</a>
        </div>
        <div class="nav-menu">
            <a href="{{ url_for('search') }}" class="nav-link">搜索</a>
            <a href="{{ url_for('dynamic_page') }}?name=help" class="nav-link">帮助中心</a>
            {% if session.get('username') %}
                <span class="nav-welcome">欢迎，{{ session['username'] }}</span>
                <a href="{{ url_for('upload') }}" class="nav-link">上传头像</a>
                <a href="{{ url_for('profile') }}" class="nav-link">个人中心</a>
                {% if session.get('username') == 'admin' %}
                <a href="{{ url_for('admin_panel') }}" class="nav-link">管理面板</a>
                <a href="{{ url_for('view_logs') }}" class="nav-link">审计日志</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" class="nav-link">退出</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="nav-link">登录</a>
                <a href="{{ url_for('register') }}" class="nav-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
