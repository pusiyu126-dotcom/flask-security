{% extends "base.html" %}

{% block title %}用户登录 - 用户管理系统{% endblock %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户登录</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div style="background:#e6f7e6; color:#27ae60; padding:10px 14px; border-radius:6px; font-size:14px; margin-bottom:18px; border:1px solid #b3e6b3;">{{ success }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}" class="login-form">
        {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        {% endif %}
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary">登 录</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:13px;">
        没有账号？<a href="{{ url_for('register') }}">去注册</a>
    </p>
</div>
{% endblock %}
