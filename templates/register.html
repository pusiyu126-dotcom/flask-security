{% extends "base.html" %}

{% block title %}用户注册 - 用户管理系统{% endblock %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('register') }}" class="login-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机</label>
            <input type="text" id="phone" name="phone" class="form-input" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:13px;">
        已有账号？<a href="{{ url_for('login') }}">去登录</a>
    </p>
</div>
{% endblock %}
